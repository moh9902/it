<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Course Organizer | Contact Us</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="branding">Personal Course Organizer</h1>
        <nav class="site-nav" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="my-courses.html">My Courses</a></li>
            <li><a href="add-course.html">Add Course</a></li>
            <li><a class="active" href="contact.html">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="container card">
        <h2>Contact Us</h2>
        <p>Send us your question or feedback:</p>

        <form action="#" method="post">
          <div class="form-row">
            <label for="full-name">Full Name</label>
            <input id="full-name" name="fullName" type="text" required />
          </div>

          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <div class="form-row" id="contact-email">
            <label for="contact-email">Contact Email</label>
            <p><a href="mailto:MyFristPro@yahoo.com">MyFristPro@yahoo.com</a></p>
          </div>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small
          >&copy; 2026. All rights reserved.</small
        >
      </div>
    </footer>
  </body>
</html>
